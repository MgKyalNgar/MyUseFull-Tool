        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: #0f172a; /* Dark Slate Background */
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header-container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 25px;
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.95);
            padding: 20px;
            z-index: 100;
            border-bottom: 1px solid #6366f1; /* Indigo Accent */
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #6366f1; 
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .global-options {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .radio-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #cbd5e1;
            font-weight: 600;
        }

        input[type="radio"] {
            accent-color: #6366f1;
            width: 16px;
            height: 16px;
        }

        .instruction-box {
            width: 100%;
            max-width: 800px;
            background: rgba(99, 102, 241, 0.05);
            border: 1px dashed #6366f1;
            padding: 15px 20px;
            margin-bottom: 30px;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .instruction-box strong {
            color: #818cf8;
        }

        /* ----- Accordion List Container ----- */
        .accordion-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 50px;
        }

        /* ----- Accordion Item ----- */
        .accordion-item {
            background: #1e293b;
            border: 1px solid #334155;
            border-left: 4px solid #6366f1;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .accordion-item:hover {
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
        }

        /* ----- Accordion Header (Clickable) ----- */
        .accordion-header {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            background: rgba(30, 41, 59, 0.8);
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-right: 15px;
        }

        .acc-title {
            color: #f8fafc;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .acc-desc {
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .acc-icon {
            color: #6366f1;
            font-size: 1.5rem;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        /* Active State for Accordion */
        .accordion-item.active .acc-icon {
            transform: rotate(180deg);
        }
        
        .accordion-item.active {
            border-color: #818cf8;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
        }

        /* ----- Accordion Body (Collapsible Content) ----- */
        .accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: #0f172a;
        }

        .body-inner {
            padding: 25px 20px;
            border-top: 1px dashed #334155;
        }

        /* ----- Form Elements ----- */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #818cf8;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            color: #818cf8;
            padding: 12px;
            border-radius: 6px;
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        input[type="text"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        textarea {
            width: 100%;
            height: 220px;
            background: #020617;
            border: 1px solid #334155;
            color: #f8fafc;
            padding: 15px;
            border-radius: 6px;

            line-height: 1.6;
            font-size: 0.95rem;
            outline: none;
        }

        textarea:focus {
            border-color: #6366f1;
        }

        button {
            width: 100%;
            background: transparent;
            color: #818cf8;
            border: 1px solid #6366f1;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            background: #6366f1;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

    </style>
</head>

                    mm: "ဒီအောင်မြင်နေတဲ့ Channel က ပရိသတ်တွေဆီကနေ ဝင်ငွေဘယ်လိုရှာနေလဲဆိုတာ အတိအကျသိရဖို့ ဒီ Source Transcript တွေကို သုံးသပ်ပေးပါ။ ပြီးတော့ ကျွန်တော့်ရဲ့ ကိုယ်ပိုင် YouTube channel အတွက် Pinnacle AI Solutions လုပ်ငန်းစဉ်တွေနဲ့ အချိတ်အဆက်မိမိ ပေါင်းစပ်ပြီး ဝင်ငွေရလမ်းအစုံအလင်ကို တည်ဆောက်ပေးပါ။ သူတို့ရဲ့ ပြောဆိုပုံအနှေးအမြန်အပေါ် မူတည်ပြီး အလွန်တိကျတဲ့ AdSense Optimization အကြံပြုချက်တွေ၊ ဒီ Niche နဲ့ ကိုက်ညီတဲ့ အကောင်းဆုံး High-ticket Affiliate Program တွေ၊ ကျွန်တော် အလွယ်တကူဖန်တီးပြီး ရောင်းချနိုင်မယ့် ထူးခြားတဲ့ Digital Product Idea (၃) ခု၊ သူတို့ရဲ့ ကြော်ငြာဖတ်ပုံကို အတုယူထားတဲ့ Professional ဆန်တဲ့ Sponsorship Pitch Email ပုံစံနဲ့ စတင်တဲ့ Subscriber အရေအတွက် [Subscribers] ဦးအပေါ် အခြေခံထားတဲ့ လက်တွေ့ကျတဲ့ လစဉ်ဝင်ငွေခန့်မှန်းချက်တို့ကို ဖော်ပြပေးပါ။",
                    inputs: [
                        { id: "Subscribers", label: "Starting Subscribers (စတင်မည့် Subscriber အရေအတွက်)", hint: "ဥပမာ - 1000, 5000" }
                    ]
                }
            ];

            const container = document.getElementById('accordion-container');
            const langRadios = document.getElementsByName('language');

            function renderAccordion() {
                container.innerHTML = ''; 

                promptData.forEach((data) => {
                    const item = document.createElement('div');
                    item.className = 'accordion-item';
                    item.id = `acc-item-${data.id}`;

                    let html = `
                        <div class="accordion-header" onclick="toggleAccordion(${data.id})">
                            <div class="header-content">
                                <div class="acc-title">${data.title}</div>
                                <div class="acc-desc">💡 ${data.desc}</div>
                            </div>
                            <div class="acc-icon">▼</div>
                        </div>
                    `;

                    html += `<div class="accordion-body" id="acc-body-${data.id}">
                                <div class="body-inner">`;

                    if (data.inputs && data.inputs.length > 0) {
                        data.inputs.forEach(input => {
                            html += `
                                <div class="form-group">
                                    <label>${input.label}</label>
                                    <input type="text" id="input-${data.id}-${input.id}" data-item-id="${data.id}" placeholder="${input.hint}">
                                </div>
                            `;
                        });
                    }

                    html += `
                            <textarea id="output-${data.id}" readonly></textarea>
                            <button id="copy-${data.id}" data-item-id="${data.id}">Copy Prompt</button>
                        </div>
                    </div>`;

                    item.innerHTML = html;
                    container.appendChild(item);
                });

                attachEventListeners();
                updateAllPrompts();
            }

            window.toggleAccordion = function(id) {
                const item = document.getElementById(`acc-item-${id}`);
                const body = document.getElementById(`acc-body-${id}`);

                // Auto-collapse logic
                document.querySelectorAll('.accordion-item').forEach(el => {
                    if(el.id !== `acc-item-${id}`) {
                        el.classList.remove('active');
                        el.querySelector('.accordion-body').style.maxHeight = null;
                    }
                });

                if (item.classList.contains('active')) {
                    item.classList.remove('active');
                    body.style.maxHeight = null;
                } else {
                    item.classList.add('active');
                    body.style.maxHeight = body.scrollHeight + "px";
                }
            }

            function updatePromptForCard(itemId) {
                const data = promptData.find(p => p.id == itemId);
                const isMyanmar = document.querySelector('input[name="language"]:checked').value === 'mm';
                let finalPrompt = isMyanmar ? data.mm : data.en;

                if (data.inputs) {
                    data.inputs.forEach(input => {
                        const el = document.getElementById(`input-${data.id}-${input.id}`);
                        const val = el && el.value.trim() !== "" ? el.value.trim() : `[${input.id}]`;
                        finalPrompt = finalPrompt.split(`[${input.id}]`).join(val);
                    });
                }

                document.getElementById(`output-${data.id}`).value = finalPrompt;
                
                const body = document.getElementById(`acc-body-${data.id}`);
                const item = document.getElementById(`acc-item-${data.id}`);
                if(item.classList.contains('active')) {
                    body.style.maxHeight = body.scrollHeight + "px";
                }
            }

            function updateAllPrompts() {
                promptData.forEach(data => updatePromptForCard(data.id));
            }

            function attachEventListeners() {
                container.addEventListener('input', (e) => {
                    if (e.target.tagName === 'INPUT') {
                        const itemId = e.target.getAttribute('data-item-id');
                        if (itemId) updatePromptForCard(itemId);
                    }
                });

                container.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') {
                        const itemId = e.target.getAttribute('data-item-id');
                        const outputEl = document.getElementById(`output-${itemId}`);
                        outputEl.select();
                        document.execCommand('copy');
                        
                        const btn = e.target;
                        const originalText = btn.innerText;
                        btn.innerText = "COPIED! ✨";
                        setTimeout(() => btn.innerText = originalText, 2000);
                    }
                });
            }

            langRadios.forEach(radio => radio.addEventListener('change', updateAllPrompts));

            renderAccordion();
            setTimeout(() => { toggleAccordion(1); }, 100);
        });
    </script>
</body>
</html>
