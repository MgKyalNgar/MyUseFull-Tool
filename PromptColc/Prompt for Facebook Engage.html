<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Engage Master</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: #0b1120; /* Deep Indigo Background */
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .app-container {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #3b82f6; /* Bright Blue Border */
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15), inset 0 0 20px rgba(59, 130, 246, 0.05);
            border-radius: 12px;
            padding: 35px;
            width: 100%;
            max-width: 800px; 
            backdrop-filter: blur(15px);
        }

        h1 {
            color: #60a5fa; 
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.4);
        }

        .guideline-box {
            background: rgba(59, 130, 246, 0.05);
            border-left: 4px solid #3b82f6;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
            color: #bfdbfe;
            line-height: 1.6;
        }

        /* Dynamic Instruction Box */
        .instruction-box {
            background: rgba(96, 165, 250, 0.05);
            border: 1px dashed #60a5fa;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #e2e8f0;
            line-height: 1.7;
        }

        .instruction-box strong {
            color: #60a5fa;
            font-size: 0.95rem;
        }

        .instruction-box b {
            color: #93c5fd;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #60a5fa;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        input[type="text"], textarea {
            width: 100%;
            background: #0b1120;
            border: 1px solid #1e3a8a;
            color: #93c5fd;
            padding: 14px;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.2);
        }

        textarea.dynamic-textarea {
            height: 120px; 
            resize: vertical;
        }

        textarea#output-prompt {
            height: 250px;
            resize: vertical;
            line-height: 1.6;
            color: #fff;
            background: #080c17;
            border-color: #3b82f6;
        }

        .options-group {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px dashed #1e3a8a;
        }

        .radio-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #cbd5e1;
            font-weight: 600;
        }

        input[type="radio"] {
            accent-color: #3b82f6;
            width: 18px;
            height: 18px;
        }

        button {
            width: 100%;
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border: 2px solid #3b82f6;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            background: #3b82f6;
            color: #0b1120;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
        }

        #dynamic-inputs-container {
            margin-bottom: 25px;
            display: grid;
            gap: 15px;
        }

        /* Custom Dropdown CSS */
        .custom-select-container {
            position: relative;
            width: 100%;
        }

        .custom-select-trigger {
            width: 100%;
            background: #0b1120;
            border: 1px solid #1e3a8a;
            color: #60a5fa;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .custom-select-trigger:hover, .custom-select-trigger.active {
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.2);
        }

        .custom-options-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #0f172a;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            margin-top: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            max-height: 250px;
            overflow-y: auto;
            display: none;
            z-index: 100;
        }

        .custom-options-list.open {
            display: block;
        }

        .custom-option-item {
            padding: 12px 14px;
            color: #bfdbfe;
            cursor: pointer;
            font-size: 0.85rem;
            border-bottom: 1px solid #1e3a8a;
            line-height: 1.5;
            transition: background 0.2s;
        }

        .custom-option-item:last-child {
            border-bottom: none;
        }

        .custom-option-item:hover {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
        }

        .custom-options-list::-webkit-scrollbar { width: 6px; }
        .custom-options-list::-webkit-scrollbar-track { background: #0b1120; border-radius: 8px; }
        .custom-options-list::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 8px; }
        .custom-options-list::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

    </style>
</head>
<body>

    <div class="app-container">
        <h1>🚀 FB Engage Master</h1>

        <div class="form-group">
            <label>Select Engagement Strategy</label>
            <div class="custom-select-container">
                <div class="custom-select-trigger" id="custom-trigger">
                    <span id="selected-text">Loading...</span>
                    <span>▼</span>
                </div>
                <div class="custom-options-list" id="custom-options">
                    </div>
            </div>
        </div>

        <div id="guideline-container" class="guideline-box"></div>

        <div class="options-group">
            <label class="radio-btn">
                <input type="radio" name="language" value="mm" checked> Myanmar Prompt
            </label>
            <label class="radio-btn">
                <input type="radio" name="language" value="en"> English Prompt
            </label>
        </div>

        <div id="instruction-box-container" class="instruction-box"></div>

        <div id="dynamic-inputs-container"></div>

        <div class="form-group">
            <label>Final Generated Prompt</label>
            <textarea id="output-prompt" readonly></textarea>
        </div>

        <button id="copy-btn">Copy Prompt</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            const promptData = {
                "1": {

                    desc: "Engagement, Shares နဲ့ Saves တွေ တက်လာစေမယ့် Post idea အခု (၂၀) ဖန်တီးပါ။", 
                    en: "Act as a social media growth strategist. Analyze my Facebook page niche: [Niche]. Give me 20 post ideas designed to increase engagement, shares, and saves. Focus on educational, entertaining, and curiosity-driven content.",
                    mm: "Social Media Growth Strategist တစ်ယောက်အနေနဲ့ ငါ့ရဲ့ Facebook page niche ဖြစ်တဲ့ [Niche] ကို လေ့လာဆန်းစစ်ပေးပါ။ Engagement, Shares နဲ့ Saves တွေ တက်လာစေမယ့် Post idea အခု (၂၀) ဖန်တီးပေးပါ။ ဗဟုသုတရစေမယ့်အရာတွေ၊ ဖျော်ဖြေရေးဆန်တာတွေနဲ့ စပ်စုချင်စရာကောင်းတဲ့ Content မျိုးတွေကို အဓိကထားပေးပါ။",
                    inputs: [ { id: "Niche", label: "Niche (လုပ်ငန်းအမျိုးအစား)", type: "text", hint: "ဥပမာ - Beauty, Tech Reviews, Real Estate" } ] 
                },
                "2": { 
                    title: "📌 Prompt 2: ဆွဲဆောင်မှုရှိတဲ့ Hook များ ဖန်တီးရန်", 
                    desc: "Scroll ဆွဲနေတဲ့သူတွေကို ရပ်တန့်သွားစေမယ့် Facebook hooks (၁၀) ခုကို ရေးပေးပါ။", 
                    en: "Create 10 highly engaging Facebook hooks for posts about [Topic]. The hooks must be scroll-stopping but not clickbait, and they should encourage people to comment or share.",
                    mm: "[Topic] နဲ့ပတ်သက်ပြီး လူတွေအများကြီး စိတ်ဝင်စားစေမယ့် Facebook hooks (၁၀) ခုကို ရေးပေးပါ။ အဲဒီ Hooks တွေက Clickbait မဖြစ်စေဘဲ Scroll ဆွဲနေတဲ့သူတွေကို ရပ်တန့်သွားစေရမယ်။ ပြီးတော့ Comment ဒါမှမဟုတ် Share လုပ်ချင်လာအောင် ဆွဲဆောင်နိုင်ရမယ်။",
                    inputs: [ { id: "Topic", label: "Topic (အကြောင်းအရာ)", type: "text", hint: "ဥပမာ - အသားအရေ ထိန်းသိမ်းနည်း၊ ငွေစုနည်း" } ] 
                },
                "3": { 
                    title: "📌 Prompt 3: Post အဟောင်းကို ပြန်လည်အသက်သွင်းရန်", 
                    desc: "Engagement နည်းနေတဲ့ Post အဟောင်းကို ပိုကောင်းအောင် ပြန်ရေးပေးပါ။", 
                    en: "Analyze this Facebook post and improve it for engagement. Rewrite it with a stronger hook, clearer storytelling, and a call-to-action that encourages discussion: [Paste post]",
                    mm: "ဒီ Facebook post ကိုလေ့လာပြီး Engagement ပိုတက်လာအောင် ပြင်ရေးပေးပါ။ ပိုမိုအားကောင်းတဲ့ Hook၊ ရှင်းလင်းတဲ့ ပုံပြင်ပြောဟန် (Storytelling) နဲ့ ဆွေးနွေးပြောဆိုမှုတွေကို အားပေးတဲ့ Call-to-action (CTA) ပါဝင်အောင် ပြန်ရေးပေးပါ။ [Paste post]",

                "4": {

                    inputs: [ { id: "Niche", label: "Niche (လုပ်ငန်းအမျိုးအစား)", type: "text", hint: "ဥပမာ - Fitness Coaching, Digital Marketing" } ] 
                },
                "5": { 
                    title: "📌 Prompt 5: ရက် (၃၀) စာ Content Calendar ဆွဲရန်", 
                    desc: "Facebook အတွက် တစ်လစာ Posting Calendar စနစ်တကျ ရေးဆွဲပါ။", 
                    en: "Create a 30-day Facebook posting calendar for a page about [Topic]. Each post should include the idea, hook, and goal of the post (engagement, shares, or saves).",

                    inputs: [ { id: "Topic", label: "Page Topic (Page ၏ အဓိက အကြောင်းအရာ)", type: "text", hint: "ဥပမာ - နိုင်ငံခြားစာသင်စရိတ် လျှော့ချနည်းများ" } ] 
                },
                "6": { 
                    title: "📌 Prompt 6: ရိုးရိုး Idea ကို Viral Post အဖြစ်ပြောင်းရန်", 
                    desc: "ရိုးရှင်းတဲ့ အကြံဉာဏ်ကို ဆွေးနွေးမှုတွေဖြစ်လာစေမယ့် Viral Post အဖြစ် ပြောင်းလဲပေးပါ။", 
                    en: "Turn this idea into a viral-style Facebook post that encourages discussion but stays authentic and informative: [Paste idea].",
                    mm: "ဒီ Idea ကို ဆွေးနွေးမှုတွေဖြစ်လာစေမယ့် Viral-style Facebook post တစ်ခုအဖြစ် ပြောင်းလဲပေးပါ။ ဒါပေမယ့် ယုံကြည်ရပြီး သတင်းအချက်အလက်ပြည့်စုံတဲ့ ပုံစံမျိုးကို ဆက်ထိန်းထားပေးပါ။ [Paste idea]။",
                    inputs: [ { id: "Paste idea", label: "Your Idea (သင်၏ အကြံဉာဏ်/အကြောင်းအရာ)", type: "textarea", hint: "ဥပမာ - မနက်စောစောထတာ ကျန်းမာရေးအတွက် ကောင်းတယ် ဆိုတဲ့အကြောင်း" } ]

                "7": { 
                    title: "📌 Prompt 7: Share အများဆုံးရမယ့် Post မျိုးရေးရန်",

                    inputs: []

                "10": {

                    desc: "Comment တွေ အများကြီးရစေမယ့် မေးခွန်းတွေနဲ့ အဆုံးသတ်တဲ့ Post များ ဖန်တီးပါ။", 
                    en: "Create 10 Facebook posts designed to spark conversation in the niche [Topic]. Each post should end with a question that encourages comments.",
                    mm: "[Topic] နဲ့ပတ်သက်ပြီး စကားဝိုင်းတွေ၊ ဆွေးနွေးမှုတွေဖြစ်လာစေဖို့ ရည်ရွယ်ထားတဲ့ Facebook post (၁၀) ခုကို ဖန်တီးပေးပါ။ Post တစ်ခုစီတိုင်းကို Comment ပေးချင်လာစေမယ့် မေးခွန်းတစ်ခုနဲ့ အဆုံးသတ်ပေးပါ။",
                    inputs: [ { id: "Topic", label: "Topic (အကြောင်းအရာ)", type: "text", hint: "ဥပမာ - ရုပ်ရှင်ရုံသွားကြည့်တာနဲ့ အိမ်မှာကြည့်တာ ဘယ်ဟာပိုကြိုက်လဲ" } ] 
                }
            };

            const trigger = document.getElementById('custom-trigger');
            const triggerText = document.getElementById('selected-text');
            const optionsList = document.getElementById('custom-options');
            const guidelineEl = document.getElementById('guideline-container');
            const instructionEl = document.getElementById('instruction-box-container');
            const dynamicContainer = document.getElementById('dynamic-inputs-container');
            const outputEl = document.getElementById('output-prompt');
            const copyBtn = document.getElementById('copy-btn');
            const langRadios = document.getElementsByName('language');

            let currentSelectedId = "1";

            function initCustomDropdown() {
                let isFirst = true;
                optionsList.innerHTML = ''; 

                for (const key in promptData) {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'custom-option-item';
                    
                    const cleanTitle = promptData[key].title.replace(/\+\]/g, '').trim();
                    optDiv.textContent = cleanTitle;
                    
                    if (isFirst) {
                        triggerText.textContent = cleanTitle;
                        isFirst = false;
                    }

                    optDiv.addEventListener('click', () => {
                        currentSelectedId = key;
                        triggerText.textContent = cleanTitle;
                        optionsList.classList.remove('open');
                        trigger.classList.remove('active');
                        renderUI();
                    });

                    optionsList.appendChild(optDiv);
                }

                trigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    optionsList.classList.toggle('open');
                    trigger.classList.toggle('active');
                });

                document.addEventListener('click', (e) => {
                    if (!trigger.contains(e.target) && !optionsList.contains(e.target)) {
                        optionsList.classList.remove('open');
                        trigger.classList.remove('active');
                    }
                });
            }

            function renderUI() {
                const data = promptData[currentSelectedId];
                
                const cleanDesc = data.desc.replace(/\+\]/g, '').trim();
                guidelineEl.textContent = `💡 ${cleanDesc}`;
                
                let htmlContent = '';
                let instructionHTML = '<strong>💡 ဖြည့်စွက်ရန် လမ်းညွှန်ချက်:</strong><br><br>';

                if(data.inputs.length > 0) {
                    data.inputs.forEach(input => {
                        instructionHTML += `• <b>[${input.id}]</b> နေရာတွင် <i>"${input.hint}"</i> စသဖြင့် ဖြည့်သွင်းပါ။<br>`;

                        if(input.type === 'textarea') {
                            htmlContent += `
                                <div class="form-group">
                                    <label>${input.label}</label>
                                    <textarea id="input-${input.id}" class="dynamic-textarea" placeholder="Type here..."></textarea>
                                </div>`;
                        } else {
                            htmlContent += `
                                <div class="form-group">
                                    <label>${input.label}</label>
                                    <input type="text" id="input-${input.id}" placeholder="Type here...">
                                </div>`;
                        }
                    });
                    instructionEl.style.display = 'block';
                    instructionEl.innerHTML = instructionHTML;
                } else {
                    // Inputs မလိုတဲ့ Prompt တွေအတွက် (ဥပမာ - Prompt 9)
                    instructionEl.style.display = 'none';
                    htmlContent = `<div style="color: #60a5fa; text-align: center; padding: 10px 0;">✨ ဤ Prompt အတွက် ဖြည့်စွက်ရန် အချက်အလက် မလိုအပ်ပါ။ ချက်ချင်း Copy ယူအသုံးပြုနိုင်ပါသည်။</div>`;
                }

                dynamicContainer.innerHTML = htmlContent;

                data.inputs.forEach(input => {
                    const el = document.getElementById(`input-${input.id}`);
                    if(el) {
                        el.addEventListener('input', generateFinalPrompt);
                    }
                });

                generateFinalPrompt();
            }

            function generateFinalPrompt() {
                const data = promptData[currentSelectedId];
                const isEnglish = document.querySelector('input[name="language"]:checked').value === 'en';
                let finalPrompt = isEnglish ? data.en : data.mm;

                finalPrompt = finalPrompt.replace(/\+\]/g, '').trim();

                data.inputs.forEach(input => {
                    const inputElement = document.getElementById(`input-${input.id}`);
                    const inputValue = inputElement ? inputElement.value.trim() : "";
                    
                    const replacementText = inputValue !== "" ? inputValue : `[${input.id}]`;
                    
                    finalPrompt = finalPrompt.split(`[${input.id}]`).join(replacementText);
                });

                outputEl.value = finalPrompt;
            }

            langRadios.forEach(radio => radio.addEventListener('change', generateFinalPrompt));

            copyBtn.addEventListener('click', () => {
                outputEl.select();
                document.execCommand('copy');
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "COPIED SUCCESSFULLY! ✨";
                setTimeout(() => copyBtn.innerText = originalText, 2000);
            });

            initCustomDropdown();
            renderUI();

        }); 
    </script>
</body>
</html>
