<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano Banana Prompts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: #0f172a; /* Dark Slate Background */
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header-container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 25px;
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.95);
            padding: 20px;
            z-index: 100;
            border-bottom: 1px solid #facc15; /* Banana Yellow */
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #facc15; 
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .global-options {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .radio-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #cbd5e1;
            font-weight: 600;
        }

        input[type="radio"] {
            accent-color: #facc15;
            width: 16px;
            height: 16px;
        }

        /* ----- Accordion List Container ----- */
        .accordion-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 50px;
        }

        /* ----- Accordion Item ----- */
        .accordion-item {
            background: #1e293b;
            border: 1px solid #334155;
            border-left: 4px solid #facc15;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .accordion-item:hover {
            border-color: #facc15;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.1);
        }

        /* ----- Accordion Header (Clickable) ----- */
        .accordion-header {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            background: rgba(30, 41, 59, 0.8);
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-right: 15px;
        }

        .acc-title {
            color: #f8fafc;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .acc-desc {
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .acc-icon {
            color: #facc15;
            font-size: 1.5rem;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        /* Active State for Accordion */
        .accordion-item.active .acc-icon {
            transform: rotate(180deg);
        }
        
        .accordion-item.active {
            border-color: #facc15;
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.15);
        }

        /* ----- Accordion Body (Collapsible Content) ----- */
        .accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: #0f172a;
        }

        .body-inner {
            padding: 25px 20px;
            border-top: 1px dashed #334155;
        }

        /* ----- Form Elements ----- */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #fcd34d;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            color: #facc15;
            padding: 12px;
            border-radius: 6px;
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        input[type="text"]:focus {
            border-color: #facc15;
            box-shadow: 0 0 10px rgba(250, 204, 21, 0.2);
        }

        textarea {
            width: 100%;
            height: 160px;
            background: #020617;
            border: 1px solid #334155;
            color: #f8fafc;
            padding: 15px;
            border-radius: 6px;
            resize: vertical;
            line-height: 1.6;
            font-size: 0.95rem;
            outline: none;
        }

        textarea:focus {
            border-color: #facc15;
        }

        button {
            width: 100%;
            background: transparent;
            color: #facc15;
            border: 1px solid #facc15;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            background: #facc15;
            color: #0f172a;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
        }

    </style>
</head>
<body>

    <div class="header-container">
        <h1>🍌 Nano Banana Prompts</h1>
        <p class="subtitle">Creative Image Generation & Editing Prompts</p>
        <div class="global-options">
            <label class="radio-btn">
                <input type="radio" name="language" value="mm" checked> Myanmar Prompt
            </label>
            <label class="radio-btn">
                <input type="radio" name="language" value="en"> English Prompt
            </label>
        </div>
    </div>

    <div class="accordion-container" id="accordion-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            const promptData = [

                    desc: "ဗီဒီယိုအိုင်ဒီယာတွေ တင်ပြဖို့ ဒါမှမဟုတ် Content တွေအတွက် လှပပြီး တစ်သမတ်တည်းဖြစ်တဲ့ ရုပ်ရှင်ဆန်ဆန် ပုံကြမ်းတွေကို ဖန်တီးပါ။",
                    en: "Generate a cinematic storyboard frame of [INSERT SCENE/ACTION]. Use a [INSERT AESTHETIC/GENRE] aesthetic with [INSERT SPECIFIC VISUAL DETAILS]. Frame the shot from a [INSERT CAMERA ANGLE], emphasizing the [INSERT FOCAL POINT]. Ensure highly detailed, photorealistic textures.",
                    mm: "[INSERT SCENE/ACTION] ရဲ့ ရုပ်ရှင်ဆန်တဲ့ storyboard frame တစ်ခုကို ဖန်တီးပေးပါ။ [INSERT SPECIFIC VISUAL DETAILS] အစရှိတဲ့ အမြင်ပိုင်းဆိုင်ရာ အသေးစိတ်အချက်တွေနဲ့အတူ [INSERT AESTHETIC/GENRE] ပုံစံကို အသုံးပြုပေးပါ။ [INSERT FOCAL POINT] ကို ပိုပေါ်လွင်စေဖို့ [INSERT CAMERA ANGLE] ကင်မရာထောင့်ကနေ မြင်ကွင်းကို ယူပါ။ အလွန်အသေးစိတ်ကျပြီး အစစ်အမှန်နဲ့တူတဲ့ အသွင်အပြင် (textures) တွေ ဖြစ်ပါစေ။",
                    inputs: [
                        { id: "INSERT SCENE/ACTION", label: "Scene/Action (ပြကွင်း/လှုပ်ရှားမှု)", hint: "ဥပမာ - ညဘက် အနာဂတ်မြို့တော်ရဲ့ လူစည်ကားတဲ့လမ်းမ" },
                        { id: "INSERT SPECIFIC VISUAL DETAILS", label: "Visual Details (အမြင်ပိုင်းဆိုင်ရာ အသေးစိတ်)", hint: "ဥပမာ - မိုးရေအိုင်တွေမှာ ရောင်ပြန်ဟပ်နေတဲ့ နီယွန်ဆိုင်းဘုတ်တွေ" },
                        { id: "INSERT AESTHETIC/GENRE", label: "Aesthetic/Genre (ပုံစံ/အမျိုးအစား)", hint: "ဥပမာ - cyberpunk, fantasy" },
                        { id: "INSERT FOCAL POINT", label: "Focal Point (အဓိက အာရုံစိုက်ရမည့်အရာ)", hint: "ဥပမာ - လမ်းလျှောက်နေသော ဇာတ်ကောင်" },
                        { id: "INSERT CAMERA ANGLE", label: "Camera Angle (ကင်မရာ ထောင့်)", hint: "ဥပမာ - အောက်မှပင့်ရိုက်သော (low angle)" }
                    ]
                }
            ];

            const container = document.getElementById('accordion-container');
            const langRadios = document.getElementsByName('language');

            function renderAccordion() {
                container.innerHTML = ''; 

                promptData.forEach((data, index) => {
                    const item = document.createElement('div');
                    item.className = 'accordion-item';
                    item.id = `acc-item-${data.id}`;

                    // Header (Clickable)
                    let html = `
                        <div class="accordion-header" onclick="toggleAccordion(${data.id})">
                            <div class="header-content">
                                <div class="acc-title">${data.title}</div>
                                <div class="acc-desc">💡 ${data.desc}</div>
                            </div>
                            <div class="acc-icon">▼</div>
                        </div>
                    `;

                    // Body (Collapsible)
                    html += `<div class="accordion-body" id="acc-body-${data.id}">
                                <div class="body-inner">`;

                    data.inputs.forEach(input => {
                        html += `
                            <div class="form-group">
                                <label>${input.label}</label>
                                <input type="text" id="input-${data.id}-${input.id}" data-item-id="${data.id}" placeholder="${input.hint}">
                            </div>
                        `;
                    });

                    html += `
                            <textarea id="output-${data.id}" readonly></textarea>
                            <button id="copy-${data.id}" data-item-id="${data.id}">Copy Prompt</button>
                        </div>
                    </div>`;

                    item.innerHTML = html;
                    container.appendChild(item);
                });

                attachEventListeners();
                updateAllPrompts();
            }

            // Accordion အဖွင့်/အပိတ် လော့ဂျစ်
            window.toggleAccordion = function(id) {
                const item = document.getElementById(`acc-item-${id}`);
                const body = document.getElementById(`acc-body-${id}`);
                
                // အခြားပွင့်နေတာတွေ ပိတ်ချင်ရင် အောက်က code ဖွင့်သုံးပါ
                
                document.querySelectorAll('.accordion-item').forEach(el => {
                    if(el.id !== `acc-item-${id}`) {
                        el.classList.remove('active');
                        el.querySelector('.accordion-body').style.maxHeight = null;
                    }
                });
                

                if (item.classList.contains('active')) {
                    item.classList.remove('active');
                    body.style.maxHeight = null;
                } else {
                    item.classList.add('active');
                    body.style.maxHeight = body.scrollHeight + "px";
                }
            }

            function updatePromptForCard(itemId) {
                const data = promptData.find(p => p.id == itemId);
                const isMyanmar = document.querySelector('input[name="language"]:checked').value === 'mm';
                let finalPrompt = isMyanmar ? data.mm : data.en;

                data.inputs.forEach(input => {
                    const el = document.getElementById(`input-${data.id}-${input.id}`);
                    const val = el && el.value.trim() !== "" ? el.value.trim() : `[${input.id}]`;
                    finalPrompt = finalPrompt.split(`[${input.id}]`).join(val);
                });

                document.getElementById(`output-${data.id}`).value = finalPrompt;
                
                // Content ပြောင်းလဲလို့ အမြင့် (height) ပြောင်းသွားရင် body ရဲ့ maxHeight ကိုပါ ပြန်ချိန်ရန်
                const body = document.getElementById(`acc-body-${data.id}`);
                const item = document.getElementById(`acc-item-${data.id}`);
                if(item.classList.contains('active')) {
                    body.style.maxHeight = body.scrollHeight + "px";
                }
            }

            function updateAllPrompts() {
                promptData.forEach(data => updatePromptForCard(data.id));
            }

            function attachEventListeners() {
                container.addEventListener('input', (e) => {
                    if (e.target.tagName === 'INPUT') {
                        const itemId = e.target.getAttribute('data-item-id');
                        if (itemId) updatePromptForCard(itemId);
                    }
                });

                container.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') {
                        const itemId = e.target.getAttribute('data-item-id');
                        const outputEl = document.getElementById(`output-${itemId}`);
                        outputEl.select();
                        document.execCommand('copy');
                        
                        const btn = e.target;
                        const originalText = btn.innerText;
                        btn.innerText = "COPIED! ✨";
                        setTimeout(() => btn.innerText = originalText, 2000);
                    }
                });
            }

            langRadios.forEach(radio => radio.addEventListener('change', updateAllPrompts));

            renderAccordion();
            
            // ပထမဆုံးတစ်ခုကို အစမ်းဖွင့်ပြထားရန်
            setTimeout(() => { toggleAccordion(1); }, 100);
        });
    </script>
