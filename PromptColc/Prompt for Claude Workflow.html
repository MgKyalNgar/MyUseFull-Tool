<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#111827"> <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="My Useful Tools">
    <link rel="apple-touch-icon" href="../icon-192x192.png">
    <title>Claude Workflow Automation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: #18181b; /* Deep Slate / Zinc 900 */
            color: #e4e4e7;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header-container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 25px;
            position: sticky;
            top: 0;
            background: rgba(24, 24, 27, 0.95);
            padding: 20px;
            z-index: 100;
            border-bottom: 1px solid #d97757; /* Claude Terracotta/Amber */
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #d97757; 
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(217, 119, 87, 0.3);
        }

        .subtitle {
            color: #a1a1aa;
            font-size: 1rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .global-options {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .radio-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #d4d4d8;
            font-weight: 600;
        }

        input[type="radio"] {
            accent-color: #d97757;
            width: 16px;
            height: 16px;
        }

        /* ----- Accordion List Container ----- */
        .accordion-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 50px;
        }

        /* ----- Accordion Item ----- */
        .accordion-item {
            background: #27272a;
            border: 1px solid #3f3f46;
            border-left: 4px solid #d97757;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .accordion-item:hover {
            border-color: #d97757;
            box-shadow: 0 0 15px rgba(217, 119, 87, 0.1);
        }

        /* ----- Accordion Header (Clickable) ----- */
        .accordion-header {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            background: rgba(39, 39, 42, 0.8);
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-right: 15px;
        }

        .acc-title {
            color: #fafafa;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .acc-desc {
            color: #a1a1aa;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .acc-icon {
            color: #d97757;
            font-size: 1.5rem;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        .accordion-item.active .acc-icon {
            transform: rotate(180deg);
        }
        
        .accordion-item.active {
            border-color: #d97757;
            box-shadow: 0 0 20px rgba(217, 119, 87, 0.15);
        }

        /* ----- Accordion Body ----- */
        .accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: #18181b;
        }

        .body-inner {
            padding: 25px 20px;
            border-top: 1px dashed #3f3f46;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #f4a286;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        input[type="text"], textarea.input-textarea {
            width: 100%;
            background: #27272a;
            border: 1px solid #3f3f46;
            color: #d97757;
            padding: 12px;
            border-radius: 6px;
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        textarea.input-textarea {
            height: 100px;
            resize: vertical;
        }

        input[type="text"]:focus, textarea.input-textarea:focus {
            border-color: #d97757;
            box-shadow: 0 0 10px rgba(217, 119, 87, 0.2);
        }

        textarea.output-area {
            width: 100%;
            height: 220px;
            background: #09090b;
            border: 1px solid #3f3f46;
            color: #fafafa;
            padding: 15px;
            border-radius: 6px;
            resize: vertical;
            line-height: 1.6;
            font-size: 0.95rem;
            outline: none;
            margin-top: 10px;
        }

        textarea.output-area:focus {
            border-color: #d97757;
        }

        button {
            width: 100%;
            background: transparent;
            color: #d97757;
            border: 1px solid #d97757;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            background: #d97757;
            color: #18181b;
            box-shadow: 0 0 15px rgba(217, 119, 87, 0.4);
        }

    </style>
</head>
<body>

    <div class="header-container">
        <h1>⚙️ Prompt for Claude Workflow</h1>
        <p class="subtitle"> အလုပ်တွေကို စက္ကန့်ပိုင်းအတွင်း ပြီးမြောက်စေမယ့် Agentic Automation & File Management Prompts</p>
        <div class="global-options">
            <label class="radio-btn">
                <input type="radio" name="language" value="mm" checked> Myanmar Prompt
            </label>
            <label class="radio-btn">
                <input type="radio" name="language" value="en"> English Prompt
            </label>
        </div>
    </div>

    <div class="accordion-container" id="accordion-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            const promptData = [
                {
                    id: 1,
                    title: "၁။ အီးမေးလ် စီမံခြင်းနှင့် အနှစ်ချုပ်ခြင်း (Inbox triage)",
                    desc: "အီးမေးလ်တွေကို အရေးကြီး/အရေးပေါ် ခွဲခြားပြီး အလိုအလျောက် စာပြန်ရေးခိုင်းရန်။",
                    en: "You are a Chief of Staff with 10 years of executive support experience. I need you to process my inbox one email at a time using this exact chain of reasoning:\nStep 1 → Classify: Is this urgent (needs reply today), important (needs reply this week), or noise (unsubscribe/archive)?\nStep 2 → Extract: Pull out the sender, request, deadline, and any names mentioned.\nStep 3 → Draft: Write a reply under 4 sentences. Match the sender's tone. Never use \"I hope this email finds you well.\"\nStep 4 → Flag: If it involves money, legal language, or a deadline under 24 hours, mark it [ESCALATE] before the reply.\nProcess every email in my inbox folder. Output in this format: [CLASSIFICATION] | [EXTRACTED INFO] | [DRAFT REPLY] | [FLAG IF NEEDED] Do not stop until every email is processed.",
                    mm: "မင်းက အမှုဆောင်အရာရှိတွေကို ကူညီထောက်ပံ့ပေးတဲ့ လုပ်ငန်းအတွေ့အကြုံ ၁၀ နှစ်ရှိတဲ့ Chief of Staff တစ်ယောက်ပါ။ ငါ့ရဲ့ Inbox ထဲက အီးမေးလ်တွေကို တစ်စောင်ချင်းစီ အောက်ပါ အဆင့်တွေအတိုင်း စီမံပေးပါ-\nအဆင့် ၁ - ခွဲခြားပါ : ဒါက အရေးပေါ်လား (ဒီနေ့စာပြန်ရမည်)၊ အရေးကြီးလား (ဒီအပတ်ထဲစာပြန်ရမည်)၊ ဒါမှမဟုတ် အမှိုက်လား (Unsubscribe/Archive လုပ်မည်)။\nအဆင့် ၂ - အချက်အလက်ထုတ်ပါ : ပေးပို့သူ၊ တောင်းဆိုချက်၊ နောက်ဆုံးရက် (deadline) နဲ့ ပါဝင်တဲ့ နာမည်တွေကို ထုတ်ပေးပါ။\nအဆင့် ၃ - စာပြန်ရေးပါ : ဝါကျ ၄ ကြောင်းထက်မပိုတဲ့ စာပြန်ရေးပေးပါ။ ပေးပို့သူရဲ့ လေသံနဲ့ ကိုက်ညီပါစေ။ \"I hope this email finds you well\" ကို လုံးဝ မသုံးပါနဲ့။\nအဆင့် ၄ - သတိပေးပါ : ငွေကြေး၊ ဥပဒေရေးရာ စကားလုံးတွေ ဒါမှမဟုတ် ၂၄ နာရီအတွင်း ပြီးရမယ့်ကိစ္စတွေပါရင် စာမပြန်ခင် [ESCALATE] လို့ မှတ်သားပေးပါ။\nInbox ထဲက အီးမေးလ်တိုင်းကို [CLASSIFICATION] | [EXTRACTED INFO] | [DRAFT REPLY] | [FLAG IF NEEDED] ပုံစံနဲ့ ထုတ်ပေးပါ။ အီးမေးလ်အားလုံး မပြီးမချင်း မရပ်ပါနဲ့။",
                    inputs: []
                },
                {
                    id: 2,
                    title: "၂။ စာရွက်စာတမ်း မူကြမ်းရေးဆွဲခြင်း (Document drafting)",
                    desc: "တစ်ပိုင်းတစ်စဖြစ်နေသော စာရွက်စာတမ်းများကို အဆုံးသတ်ရေးသားပေးရန်။",
                    en: "You are a McKinsey Senior Consultant who writes exclusively in plain English. Hard constraints: No bullet points. Prose only. No sentence longer than 20 words. Every paragraph must end with a decision or action. Never use: \"leverage,\" \"synergy,\" \"circle back,\" or \"moving forward.\" Task: Read every file in my [Target Folder] folder. For each document that is more than 50% complete, turn it into a final polished version ready to send. For documents under 50% complete, write a 3-sentence brief explaining exactly what still needs to be done and who should do it. Save all outputs as [filename]_FINAL.docx in the same folder.",
                    mm: "မင်းက ရိုးရှင်းတဲ့ အင်္ဂလိပ်စာကိုပဲ သုံးပြီးရေးတတ်တဲ့ McKinsey Senior Consultant တစ်ယောက်ပါ။\nတင်းကျပ်သော ကန့်သတ်ချက်များ - Bullet points လုံးဝမသုံးရ၊ စာပိုဒ်လိုက်သာ ရေးရန်။ စကားလုံး ၂၀ ထက်ပိုသော ဝါကျမပါရ။ စာပိုဒ်တိုင်းကို ဆုံးဖြတ်ချက် ဒါမှမဟုတ် လုပ်ဆောင်ချက်တစ်ခုနဲ့ အဆုံးသတ်ရမယ်။ \"leverage,\" \"synergy,\" \"circle back,\" သို့မဟုတ် \"moving forward\" ကို လုံးဝ မသုံးရ။\nအလုပ် - [Target Folder] ဖိုင်တွဲထဲက စာရွက်စာတမ်းတိုင်းကို ဖတ်ပါ။ ၅၀% ထက်ပိုပြီး ပြီးစီးနေတဲ့ ဖိုင်တွေကို ပေးပို့ဖို့အသင့်ဖြစ်တဲ့ နောက်ဆုံးအချောသတ်ဖိုင်အဖြစ် ပြောင်းပေးပါ။ ၅၀% အောက်သာ ပြီးသေးရင်တော့ ဘာတွေဆက်လုပ်ဖို့လိုသေးလဲ၊ ဘယ်သူလုပ်ရမလဲဆိုတာကို ဝါကျ ၃ ကြောင်းနဲ့ အကျဉ်းချုပ်ရေးပေးပါ။ ဖိုင်အားလုံးကို [filename]_FINAL.docx အမည်နဲ့ သိမ်းပေးပါ။",
                    inputs: [
                        { id: "Target Folder", label: "Target Folder (ဖတ်ရမည့် ဖိုင်တွဲအမည်)", type: "text", hint: "ဥပမာ - Documents/Drafts" }
                    ]
                },
                {
                    id: 3,
                    title: "၃။ အစည်းအဝေးမှတ်တမ်းမှ လုပ်ဆောင်ရမည့် အချက်များ (Meeting notes)",
                    desc: "အစည်းအဝေးမှတ်တမ်းများကို ဖတ်ပြီး တာဝန်ခွဲဝေမှု ဇယားထုတ်ပေးရန်။",
                    en: "I'm going to show you exactly how I want meeting notes converted into action items. [Example Format] Now apply this exact format to every .txt and .docx file in my [Target Folder] folder. If no clear owner is mentioned for a task, write [Unassigned] and add NOTE: Assign owner immediately. Export one master ACTION_ITEMS.xlsx with all tasks sorted by Priority.",
                    mm: "အစည်းအဝေးမှတ်တမ်းတွေကို လုပ်ဆောင်ရမယ့် အချက်တွေ (action items) အဖြစ် ဘယ်လိုပြောင်းချင်လဲဆိုတာ အတိအကျ ပြပေးပါမယ်။\n\n[Example Format]\n\nအခု အဲဒီ Format အတိုင်း [Target Folder] ဖိုင်တွဲထဲက .txt နဲ့ .docx ဖိုင်တိုင်းကို လုပ်ဆောင်ပေးပါ။ တာဝန်ယူရမယ့်သူ အတိအကျမပါရင် [Unassigned] လို့ရေးပြီး 'ချက်ချင်း တာဝန်ပေးအပ်ရန်' လို့ မှတ်ချက်ရေးပါ။ Task အားလုံးကို ဦးစားပေးအဆင့် (Priority) အလိုက် စီစဉ်ထားတဲ့ ACTION_ITEMS.xlsx ဖိုင်တစ်ခု ထုတ်ပေးပါ။",
                    inputs: [
                        { id: "Example Format", label: "Example Format (လိုချင်သော ပုံစံ ဥပမာပြရန်)", type: "textarea", hint: "ဥပမာ - Task Name | Owner | Deadline | Priority" },
                        { id: "Target Folder", label: "Target Folder (ဖိုင်တွဲအမည်)", type: "text", hint: "ဥပမာ - Meetings" }
                    ]
                },
                {
                    id: 4,
                    title: "၄။ အစီရင်ခံစာ သန့်စင်ခြင်းနှင့် တည်းဖြတ်ခြင်း (Report cleanup)",
                    desc: "အစီရင်ခံစာများကို သဒ္ဒါမှန်ကန်ပြီး ရှင်းလင်းပြတ်သားအောင် တည်းဖြတ်ပေးရန်။",
                    en: "Edit every report in my [Target Folder] folder. DO NOT: Add new information, change numbers/dates/names, use passive voice, leave sentences starting with \"It is\" or \"There are\", keep paragraphs longer than 4 sentences, preserve hedging language. DO: Fix grammar/spelling, replace weak verbs with strong ones, make sentences direct, ensure clear headlines. Save as [filename]_EDITED.docx and add a one-line summary of changes at the top.",
                    mm: "[Target Folder] ဖိုင်တွဲထဲက အစီရင်ခံစာတိုင်းကို တည်းဖြတ်ပေးပါ။\nမလုပ်ရမည့်အရာများ - အချက်အလက်အသစ် မထည့်ရ၊ ဂဏန်း/ရက်စွဲ/နာမည်များ မပြောင်းရ၊ Passive voice မသုံးရ၊ \"It is\" သို့မဟုတ် \"There are\" နဲ့စတဲ့ ဝါကျတွေ မထားရ၊ ဝါကျ ၄ ကြောင်းထက်ပိုတဲ့ စာပိုဒ်တွေ မထားရ၊ မသေချာတဲ့ စကားလုံးတွေ မသုံးရ။\nလုပ်ရမည့်အရာများ - သဒ္ဒါနဲ့ စာလုံးပေါင်း ပြင်ပေးပါ၊ အားနည်းတဲ့ ကြိယာတွေအစား အားကောင်းတာတွေ သုံးပါ၊ ဝါကျတိုင်းကို တိုက်ရိုက်နဲ့ ရှင်းလင်းပြတ်သားအောင်လုပ်ပါ၊ အပိုင်းတိုင်းမှာ ရှင်းလင်းတဲ့ ခေါင်းစဉ်ပါပါစေ။\n[filename]_EDITED.docx အဖြစ်သိမ်းပြီး ဖိုင်ထိပ်မှာ ဘာတွေပြင်လိုက်တယ်ဆိုတာကို စာတစ်ကြောင်းတည်းနဲ့ အနှစ်ချုပ်ရေးပေးပါ။",
                    inputs: [
                        { id: "Target Folder", label: "Target Folder (ဖိုင်တွဲအမည်)", type: "text", hint: "ဥပမာ - Reports" }
                    ]
                },
                {
                    id: 5,
                    title: "၅။ သုတေသနနှင့် ပြိုင်ဘက်လေ့လာရေး (Research + Intel)",

            const container = document.getElementById('accordion-container');

            function renderAccordion() {
                container.innerHTML = ''; 

                promptData.forEach((data) => {
                    const item = document.createElement('div');
                    item.className = 'accordion-item';
                    item.id = `acc-item-${data.id}`;

                    let html = `
                        <div class="accordion-header" onclick="toggleAccordion(${data.id})">
                            <div class="header-content">
                                <div class="acc-title">${data.title}</div>
                                <div class="acc-desc">💡 ${data.desc}</div>
                            </div>
                            <div class="acc-icon">▼</div>
                        </div>
                    `;

                    html += `<div class="accordion-body" id="acc-body-${data.id}">
                                <div class="body-inner">`;

                    if(data.inputs.length > 0) {
                        data.inputs.forEach(input => {
                            if(input.type === 'textarea') {
                                html += `
                                    <div class="form-group">
                                        <label>${input.label}</label>
                                        <textarea id="input-${data.id}-${input.id}" class="input-textarea" data-item-id="${data.id}" placeholder="${input.hint}"></textarea>
                                    </div>
                                `;
                            } else {
                                html += `
                                    <div class="form-group">
                                        <label>${input.label}</label>
                                        <input type="text" id="input-${data.id}-${input.id}" data-item-id="${data.id}" placeholder="${input.hint}">
                                    </div>
                                `;
                            }
                        });
                    }

                    html += `
                            <textarea id="output-${data.id}" class="output-area" readonly></textarea>
                            <button id="copy-${data.id}" data-item-id="${data.id}">Copy Prompt</button>
                        </div>
                    </div>`;

                    item.innerHTML = html;
                    container.appendChild(item);
                });

                attachEventListeners();
                updateAllPrompts();
            }

            window.toggleAccordion = function(id) {
                const item = document.getElementById(`acc-item-${id}`);
                const body = document.getElementById(`acc-body-${id}`);

                // Auto-collapse logic
                document.querySelectorAll('.accordion-item').forEach(el => {
                    if(el.id !== `acc-item-${id}`) {
                        el.classList.remove('active');
                        el.querySelector('.accordion-body').style.maxHeight = null;
                    }
                });

                if (item.classList.contains('active')) {
                    item.classList.remove('active');
                    body.style.maxHeight = null;
                } else {
                    item.classList.add('active');
                    body.style.maxHeight = body.scrollHeight + "px";
                }
            }

                data.inputs.forEach(input => {
                    const el = document.getElementById(`input-${data.id}-${input.id}`);
                    const val = el && el.value.trim() !== "" ? el.value.trim() : `[${input.id}]`;
                    finalPrompt = finalPrompt.split(`[${input.id}]`).join(val);
                });

                document.getElementById(`output-${data.id}`).value = finalPrompt;
                
                const body = document.getElementById(`acc-body-${data.id}`);
                const item = document.getElementById(`acc-item-${data.id}`);
                if(item.classList.contains('active')) {
                    body.style.maxHeight = body.scrollHeight + "px";
                }
            }

            function updateAllPrompts() {
                promptData.forEach(data => updatePromptForCard(data.id));
            }

            function attachEventListeners() {
                container.addEventListener('input', (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                        const itemId = e.target.getAttribute('data-item-id');
                        if (itemId) updatePromptForCard(itemId);
                    }
                });

                container.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') {
                        const itemId = e.target.getAttribute('data-item-id');
                        const outputEl = document.getElementById(`output-${itemId}`);
                        outputEl.select();
                        document.execCommand('copy');
                        
                        const btn = e.target;
                        const originalText = btn.innerText;
                        btn.innerText = "COPIED! ✨";
                        setTimeout(() => btn.innerText = originalText, 2000);
                    }
                });
            }

            langRadios.forEach(radio => radio.addEventListener('change', updateAllPrompts));

            renderAccordion();
            setTimeout(() => { toggleAccordion(1); }, 100);
        });
    </script>
</body>
</html>
