<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Gemini AI Short-form Video Prompts</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="My Useful Tools">
    <link rel="apple-touch-icon" href="../icon-192x192.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: #0f172a; /* Dark Slate Background */
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header-container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 25px;
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.95);
            padding: 20px;
            z-index: 100;
            border-bottom: 1px solid #e879f9; /* Neon Magenta */
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #e879f9; 
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(232, 121, 249, 0.4);
            word-wrap: break-word;
        }

        .subtitle {
            color: #cbd5e1;
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .remark {
            color: #f472b6;
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(232, 121, 249, 0.1);
            border-radius: 8px;
            border: 1px dashed #e879f9;
        }

        .global-options {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .radio-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #e2e8f0;
            font-weight: 600;
        }

        input[type="radio"] {
            accent-color: #e879f9;
            width: 16px;
            height: 16px;
        }

        /* ----- Accordion List Container ----- */
        .accordion-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 50px;
        }

        /* ----- Accordion Item ----- */
        .accordion-item {
            background: #1e293b;
            border: 1px solid #334155;
            border-left: 4px solid #e879f9;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .accordion-item:hover {
            border-color: #e879f9;
            box-shadow: 0 0 15px rgba(232, 121, 249, 0.1);
        }

        /* ----- Accordion Header (Clickable) ----- */
        .accordion-header {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            background: rgba(30, 41, 59, 0.8);
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-right: 15px;
        }

        .acc-title {
            color: #f8fafc;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .acc-icon {
            color: #e879f9;
            font-size: 1.5rem;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        /* Active State for Accordion */
        .accordion-item.active .acc-icon {
            transform: rotate(180deg);
        }
        
        .accordion-item.active {
            border-color: #f0abfc;
            box-shadow: 0 0 20px rgba(232, 121, 249, 0.15);
        }

        /* ----- Accordion Body ----- */
        .accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: #0f172a;
        }

        .body-inner {
            padding: 25px 20px;
            border-top: 1px dashed #334155;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #f0abfc;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            color: #e879f9;
            padding: 12px;
            border-radius: 6px;
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        input[type="text"]:focus {
            border-color: #e879f9;
            box-shadow: 0 0 10px rgba(232, 121, 249, 0.2);
        }

        textarea {
            width: 100%;
            height: 250px;
            background: #020617;
            border: 1px solid #334155;
            color: #f8fafc;
            padding: 15px;
            border-radius: 6px;
            resize: vertical;
            line-height: 1.6;
            font-size: 0.95rem;
            outline: none;
        }

        textarea:focus {
            border-color: #e879f9;
        }

        button {
            width: 100%;
            background: transparent;
            color: #f0abfc;
            border: 1px solid #e879f9;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            background: #e879f9;
            color: #0f172a;
            box-shadow: 0 0 15px rgba(232, 121, 249, 0.4);
        }

    </style>
</head>
<body>

    <div class="header-container">
        <h1>📱 Viral Video Prompts</h1>
        <div class="remark">
            Gemini AI နဲ့ သင်တို့အတွက် တစ်လ $10K တန် Content Strategist တစ်ယောက်လိုမျိုး Viral ဖြစ်မယ့် Short-form Video Channel တစ်ခုကို (အခမဲ့) တည်ဆောက်ပေးနိုင်ပါပြီ။
        </div>
        <p class="subtitle">" သုညကနေ ရက် 30 အတွင်း Viral ဖြစ်မယ့် AI ဗီဒီယို content တွေဆီ ရောက်အောင် ကူညီပေးမယ့် Prompt ၁၀ ခု "</p>
        <div class="global-options">
            <label class="radio-btn">
                <input type="radio" name="language" value="mm" checked> Myanmar Prompt
            </label>
            <label class="radio-btn">
                <input type="radio" name="language" value="en"> English Prompt
            </label>
        </div>
    </div>

    <div class="accordion-container" id="accordion-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            const promptData = [
                {
                    id: 1,
                    title: "၁။ The Viral Niche Scanner (ဗိုင်းရပ်လ်ဖြစ်မယ့် နယ်ပယ်ကိုရှာဖွေခြင်း)",
                    en: "You are a short-form video strategist who has grown 50+ accounts past 100K followers. Analyze the top 10 AI video niches on TikTok, Reels, and YouTube Shorts by engagement rate, growth speed, and monetization potential. For each, recommend the best AI video style (cinematic, anime, surreal, hyperreal). Then identify 3 competitor accounts per niche with their stats and content gaps I could own.\n\nMy interests: [YOUR TOPICS]",
                    mm: "သင်ဟာ Follower ၁ သိန်းကျော်ရှိတဲ့ အကောင့် ၅၀ ကျော်ကို ပျိုးထောင်ပေးခဲ့တဲ့ short-form video မဟာဗျူဟာပညာရှင်တစ်ယောက်ပါ။ TikTok, Reels နဲ့ YouTube Shorts ပေါ်က ထိပ်တန်း AI ဗီဒီယို niche ၁၀ ခုကို engagement rate၊ ကြီးထွားမှုနှုန်းနဲ့ ဝင်ငွေရရှိနိုင်မှု အလားအလာတွေအရ ခွဲခြမ်းစိတ်ဖြာပေးပါ။ niche တစ်ခုစီအတွက် အကောင်းဆုံး AI ဗီဒီယိုစတိုင် (cinematic, anime, surreal, hyperreal) ကို အကြံပြုပေးပါ။ ပြီးရင် niche တစ်ခုစီမှာရှိတဲ့ ပြိုင်ဘက်အကောင့် ၃ ခုရဲ့ အချက်အလက်တွေနဲ့ ကျွန်တော်ဝင်ရောက်လုပ်ကိုင်နိုင်မယ့် content gap (ဟာကွက်) တွေကို ဖော်ထုတ်ပေးပါ။\n\nကျွန်တော်စိတ်ဝင်စားတဲ့ အကြောင်းအရာများ- [YOUR TOPICS]",
                    inputs: [
                        { id: "YOUR TOPICS", label: "စိတ်ဝင်စားရာ အကြောင်းအရာများ", hint: "ဥပမာ - Tech, Horror, Motivation" }
                    ]
                },
                {
                    id: 2,
                    title: "၂။ The AI Visual Identity System (AI ရဲ့ ရုပ်မြင်သံကြား အမှတ်သညာစနစ်)",
                    en: "You are a creative director for viral AI video accounts. Build me a complete visual identity guide I can paste into any AI video tool for consistent output. Include: visual style, color grading rules, motion pacing, text overlay style, aspect ratio specs, and character/scene design rules. Then write 10 reusable video prompts and a cover image style guide.\n\nMy niche: [TOPIC]\nAccounts I like the look of: [1-3 EXAMPLES]",
                    mm: "သင်ဟာ viral ဖြစ်တဲ့ AI ဗီဒီယိုအကောင့်တွေရဲ့ creative director တစ်ယောက်ပါ။ ဗီဒီယိုတွေရဲ့ visual ပိုင်း တသမတ်တည်းဖြစ်နေစေဖို့ ဘယ် AI ဗီဒီယို tool မှာမဆို copy-paste လုပ်ပြီး သုံးလို့ရမယ့် visual identity guide အပြည့်အစုံကို တည်ဆောက်ပေးပါ။ အဲဒီထဲမှာ visual စတိုင်၊ color grading စည်းမျဉ်းများ၊ လှုပ်ရှားမှုအရှိန် (motion pacing)၊ စာသားထည့်တဲ့စတိုင် (text overlay style)၊ aspect ratio သတ်မှတ်ချက်များနဲ့ ဇာတ်ကောင်/ဇာတ်ဝင်ခန်း ဒီဇိုင်းစည်းမျဉ်းတွေ ပါဝင်ရပါမယ်။ ပြီးရင် ပြန်လည်အသုံးပြုနိုင်တဲ့ ဗီဒီယို prompt ၁၀ ခုနဲ့ cover image စတိုင်လမ်းညွှန်ကို ရေးပေးပါ။\n\nကျွန်တော့်ရဲ့ Niche- [TOPIC]\nကျွန်တော်သဘောကျတဲ့ အကောင့်များ- [1-3 EXAMPLES]",
                    inputs: [
                        { id: "TOPIC", label: "Niche အမည်", hint: "ဥပမာ - Dark Pop Stories" },
                        { id: "1-3 EXAMPLES", label: "သဘောကျသော အကောင့်များ", hint: "ဥပမာ - @ai_story, @visual_arts" }
                    ]
                },
                {
                    id: 3,
                    title: "၃။ The Hook Factory (ပရိသတ်ဆွဲဆောင်မယ့် စာသားစက်ရုံ)",
                    en: "You are a short-form video copywriter who specializes in first-3-second hooks. Give me 20 proven hook formulas for my niche with fill-in-the-blank templates. For each formula, describe the matching opening visual (movement, text, pacing). Then write 3 hook variations for my first 10 video ideas and rank which will stop the most scrolls.\n\nMy niche: [TOPIC]\nMy first 10 video ideas: [LIST THEM]",
                    mm: "သင်ဟာ ပထမဆုံး ၃ စက္ကန့်အတွင်း ပရိသတ်ကိုဆွဲဆောင်နိုင်မယ့် hook တွေကို အထူးပြုတဲ့ short-form video copywriter တစ်ယောက်ပါ။ ကျွန်တော့်ရဲ့ niche အတွက် အောင်မြင်မှုရထားပြီးသား hook formula ၂၀ ကို ကွက်လပ်ဖြည့်ပုံစံ (template) တွေနဲ့ပေးပါ။ formula တစ်ခုစီအတွက် လိုက်ဖက်တဲ့ အဖွင့် visual (လှုပ်ရှားမှု၊ စာသား၊ အရှိန်) ကို ဖော်ပြပေးပါ။ ပြီးရင် ကျွန်တော့်ရဲ့ ပထမဆုံး ဗီဒီယိုအိုင်ဒီယာ ၁၀ ခုအတွက် hook ပုံစံကွဲ ၃ ခုစီရေးပေးပြီး ဘယ်ဟာက scroll လုပ်တာကို အများဆုံးရပ်တန့်စေနိုင်မလဲဆိုတာ အဆင့်သတ်မှတ်ပေးပါ။\n\nကျွန်တော့်ရဲ့ Niche- [TOPIC]\nကျွန်တော့်ရဲ့ ပထမဆုံး ဗီဒီယိုအိုင်ဒီယာ ၁၀ ခု- [LIST THEM]",
                    inputs: [
                        { id: "TOPIC", label: "Niche အမည်", hint: "ဥပမာ - Tech Tips" },
                        { id: "LIST THEM", label: "ဗီဒီယိုအိုင်ဒီယာ ၁၀ ခု", hint: "၁...၊ ၂...၊ ၃..." }
                    ]
                },
                {
                    id: 4,
                    title: "၄။ The 60-Second Script Engine (မိနစ်ဝက် ဇာတ်ညွှန်းအင်ဂျင်)",
                    en: "You are a short-form scriptwriter for AI video creators. Write a full production-ready script for my video. Include: a 3-second pattern interrupt hook, rising tension structure, and [VISUAL] tags at every scene break describing what the AI video clip should show. Keep it under 60 seconds. Add one CTA at the end that drives follows or saves.\n\nVideo topic: [YOUR IDEA]\nTarget length: [30 / 45 / 60 SECONDS]\nVisual style: [YOUR STYLE]",
                    mm: "သင်ဟာ AI ဗီဒီယိုဖန်တီးသူတွေအတွက် short-form ဇာတ်ညွှန်းရေးဆရာတစ်ယောက်ပါ။ ကျွန်တော့်ဗီဒီယိုအတွက် ထုတ်လုပ်ဖို့အသင့်ဖြစ်နေတဲ့ ဇာတ်ညွှန်းအပြည့်အစုံကို ရေးပေးပါ။ အဲဒီထဲမှာ ၃ စက္ကန့်စာ pattern interrupt hook၊ စိတ်ဝင်စားမှု တဖြည်းဖြည်းမြင့်တက်လာစေမယ့် ဖွဲ့စည်းပုံနဲ့ ဇာတ်ဝင်ခန်းအကူးအပြောင်းတိုင်းမှာ AI ဗီဒီယိုကလစ်က ဘာကိုပြသသင့်သလဲဆိုတာကို ဖော်ပြတဲ့ [VISUAL] tag တွေ ပါဝင်ရပါမယ်။ မိနစ် ၆၀ အောက်ပဲဖြစ်ပါစေ။ နောက်ဆုံးမှာ follow ဒါမှမဟုတ် save လုပ်ဖို့ တိုက်တွန်းတဲ့ CTA တစ်ခု ထည့်ပေးပါ။\n\nဗီဒီယိုအကြောင်းအရာ- [YOUR IDEA]\nရည်မှန်းထားတဲ့အရှည်- [30 / 45 / 60 SECONDS]\nVisual စတိုင်- [YOUR STYLE]",
                    inputs: [
                        { id: "YOUR IDEA", label: "ဗီဒီယိုအိုင်ဒီယာ", hint: "ဥပမာ - AI Web Design Tools" },
                        { id: "30 / 45 / 60 SECONDS", label: "ဗီဒီယိုအရှည်စက္ကန့်", hint: "ဥပမာ - 45 Seconds" },
                        { id: "YOUR STYLE", label: "Visual စတိုင်", hint: "ဥပမာ - Cinematic, Cyberpunk" }
                    ]
                },
                {
                    id: 5,
                    title: "၅။ The AI Video Production Workflow (AI ဗီဒီယိုထုတ်လုပ်မှု လုပ်ငန်းစဉ်)",
                    en: "You are an AI video production consultant for short-form creators. Build me a step-by-step workflow to go from idea to posted Reel in under 45 minutes. Include the exact AI tools for each step (script, video clips, voiceover, music, captions, editing), copy-paste prompt templates, a batch production plan for creating 10-15 videos in one session, and a monthly cost breakdown.\n\nMy budget: [AMOUNT]\nPosting goal: [VIDEOS/WEEK]",
                    mm: "သင်ဟာ short-form ဖန်တီးသူတွေအတွက် AI ဗီဒီယိုထုတ်လုပ်မှု အကြံပေးပုဂ္ဂိုလ်တစ်ယောက်ပါ။ အိုင်ဒီယာကနေ Reel တင်တဲ့အထိ မိနစ် ၄၅ အောက်နဲ့ ပြီးမြောက်နိုင်မယ့် အဆင့်ဆင့်လုပ်ငန်းစဉ်ကို တည်ဆောက်ပေးပါ။ အဆင့်တစ်ခုစီ (ဇာတ်ညွှန်း၊ ဗီဒီယိုကလစ်များ၊ voiceover၊ တေးဂီတ၊ စာတန်းထိုး၊ တည်းဖြတ်ခြင်း) အတွက် တိကျတဲ့ AI tool များ၊ copy-paste လုပ်လို့ရမယ့် prompt template များ၊ ဗီဒီယို ၁၀-၁၅ ခုကို တစ်ထိုင်တည်း ဖန်တီးနိုင်မယ့် batch production အစီအစဉ်နဲ့ လစဉ်ကုန်ကျစရိတ် အသေးစိတ်ကို ထည့်သွင်းပေးပါ။\n\nကျွန်တော့်ဘတ်ဂျက်- [AMOUNT]\nတင်ဖို့ရည်မှန်းချက်- [VIDEOS/WEEK]",
                    inputs: [
                        { id: "AMOUNT", label: "ဘတ်ဂျက်ပမာဏ", hint: "ဥပမာ - $50/month" },
                        { id: "VIDEOS/WEEK", label: "တစ်ပတ်လျှင် တင်မည့်ဗီဒီယို", hint: "ဥပမာ - 3 Videos per week" }
                    ]
                },
                {

                    mm: "သင်ဟာ အကောင့် ၂၀ ကို သုညကနေ Follower ၁ သိန်းအထိ ရက် ၆၀ အတွင်း ရောက်အောင်လုပ်ပေးခဲ့တဲ့ viral AI video consultant တစ်ယောက်ပါ။ ကျွန်တော့်အတွက် ပြီးပြည့်စုံတဲ့ launch plan တစ်ခုပေးပါ- ကျွန်တော့်အိုင်ဒီယာကို ပွင့်ပွင့်လင်းလင်း သုံးသပ်ချက်၊ ပထမလအတွက် အပတ်စဉ် လုပ်ဆောင်ရမယ့်အရာများ၊ နေ့တိုင်း post တင်မယ့် တစ်ဦးတည်းဖန်တီးသူအတွက် ထုတ်လုပ်မှုစနစ်၊ ၇/၁၄/၂၁/၃၀ ရက်တွေမှာ ရောက်ရှိရမယ့် ပစ်မှတ်များနဲ့ အခုချက်ချင်းလုပ်သင့်တဲ့ သက်ရောက်မှုအရှိဆုံး အရာတစ်ခု။\n\nကျွန်တော့်ရဲ့အကောင့်အိုင်ဒီယာ- [NICHE + VISUAL STYLE]\nတစ်ပတ်လျှင် အချိန်ပေးနိုင်မှု- [TIME]\nကျွန်တော့်ရဲ့ ရက် ၃၀ ရည်မှန်းချက်- [TARGET]",
                    inputs: [
                        { id: "NICHE + VISUAL STYLE", label: "Niche + Visual Style", hint: "ဥပမာ - Tarot Card Readings + Mystical Aesthetics" },
                        { id: "TIME", label: "တစ်ပတ်လျှင် အချိန်ပေးနိုင်မှု", hint: "ဥပမာ - 10 hours" },
                        { id: "TARGET", label: "ရက် ၃၀ ရည်မှန်းချက်", hint: "ဥပမာ - 1000 Followers" }
                    ]
                }
            ];

            const container = document.getElementById('accordion-container');
            const langRadios = document.getElementsByName('language');

            function renderAccordion() {
                container.innerHTML = ''; 

                promptData.forEach((data) => {
                    const item = document.createElement('div');
                    item.className = 'accordion-item';
                    item.id = `acc-item-${data.id}`;

                    let html = `
                        <div class="accordion-header" onclick="toggleAccordion(${data.id})">
                            <div class="header-content">
                                <div class="acc-title">${data.title}</div>
                            </div>
                            <div class="acc-icon">▼</div>
                        </div>
                    `;

                    html += `<div class="accordion-body" id="acc-body-${data.id}">
                                <div class="body-inner">`;

                    if (data.inputs && data.inputs.length > 0) {
                        data.inputs.forEach(input => {
                            html += `
                                <div class="form-group">
                                    <label>${input.label}</label>
                                    <input type="text" id="input-${data.id}-${input.id}" data-item-id="${data.id}" placeholder="${input.hint}">
                                </div>
                            `;
                        });
                    }

                    html += `
                            <textarea id="output-${data.id}" readonly></textarea>
                            <button id="copy-${data.id}" data-item-id="${data.id}">Copy Prompt</button>
                        </div>
                    </div>`;

                    item.innerHTML = html;
                    container.appendChild(item);
                });

                attachEventListeners();
                updateAllPrompts();
            }

            window.toggleAccordion = function(id) {
                const item = document.getElementById(`acc-item-${id}`);
                const body = document.getElementById(`acc-body-${id}`);

                // Auto-collapse logic
                document.querySelectorAll('.accordion-item').forEach(el => {
                    if(el.id !== `acc-item-${id}`) {
                        el.classList.remove('active');
                        el.querySelector('.accordion-body').style.maxHeight = null;
                    }
                });

                if (item.classList.contains('active')) {
                    item.classList.remove('active');
                    body.style.maxHeight = null;
                } else {
                    item.classList.add('active');
                    body.style.maxHeight = body.scrollHeight + "px";
                }
            }

            function updatePromptForCard(itemId) {
                const data = promptData.find(p => p.id == itemId);
                const isMyanmar = document.querySelector('input[name="language"]:checked').value === 'mm';
                let finalPrompt = isMyanmar ? data.mm : data.en;

                if (data.inputs) {
                    data.inputs.forEach(input => {
                        const el = document.getElementById(`input-${data.id}-${input.id}`);
                        const val = el && el.value.trim() !== "" ? el.value.trim() : `[${input.id}]`;
                        finalPrompt = finalPrompt.split(`[${input.id}]`).join(val);
                    });
                }

                document.getElementById(`output-${data.id}`).value = finalPrompt;
            }

            function updateAllPrompts() {
                promptData.forEach(data => updatePromptForCard(data.id));
            }

            function attachEventListeners() {
                container.addEventListener('input', (e) => {
                    if (e.target.tagName === 'INPUT') {
                        const itemId = e.target.getAttribute('data-item-id');
                        if (itemId) updatePromptForCard(itemId);
                    }
                });

                container.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') {
                        const itemId = e.target.getAttribute('data-item-id');
                        const outputEl = document.getElementById(`output-${itemId}`);
                        outputEl.select();
                        document.execCommand('copy');
                        
                        const btn = e.target;
                        const originalText = btn.innerText;
                        btn.innerText = "COPIED! ✨";
                        setTimeout(() => btn.innerText = originalText, 2000);
                    }
                });
            }

            langRadios.forEach(radio => radio.addEventListener('change', updateAllPrompts));

            renderAccordion();
        });
    </script>
