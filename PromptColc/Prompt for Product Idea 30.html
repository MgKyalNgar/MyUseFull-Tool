<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Product Idea Prompt 30</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: #111827; /* Dark Slate Background */
            color: #e5e7eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header-container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 25px;
            position: sticky;
            top: 0;
            background: rgba(17, 24, 39, 0.95);
            padding: 20px;
            z-index: 100;
            border-bottom: 1px solid #14b8a6; /* Teal/Cyan */
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #14b8a6; 
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(20, 184, 166, 0.3);
        }

        .subtitle {
            color: #9ca3af;
            font-size: 1rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .global-options {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .radio-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #d1d5db;
            font-weight: 600;
        }

        input[type="radio"] {
            accent-color: #14b8a6;
            width: 16px;
            height: 16px;
        }

        /* Section Title */
        .section-title {
            width: 100%;
            max-width: 800px;
            color: #f87171; /* Coral Red for section breaks */
            font-size: 1.3rem;
            font-weight: 700;
            margin: 30px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px dashed #374151;
            text-transform: uppercase;
        }

        /* ----- Accordion List Container ----- */
        .accordion-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 50px;
        }

        /* ----- Accordion Item ----- */
        .accordion-item {
            background: #1f2937;
            border: 1px solid #374151;
            border-left: 4px solid #14b8a6;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .accordion-item:hover {
            border-color: #14b8a6;
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.1);
        }

        /* ----- Accordion Header (Clickable) ----- */
        .accordion-header {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            background: rgba(31, 41, 55, 0.8);
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-right: 15px;
        }

        .acc-title {
            color: #f3f4f6;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .acc-desc {
            color: #9ca3af;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .acc-icon {
            color: #14b8a6;
            font-size: 1.5rem;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        .accordion-item.active .acc-icon {
            transform: rotate(180deg);
        }
        
        .accordion-item.active {
            border-color: #14b8a6;
            box-shadow: 0 0 20px rgba(20, 184, 166, 0.15);
        }

        /* ----- Accordion Body ----- */
        .accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: #111827;
        }

        .body-inner {
            padding: 25px 20px;
            border-top: 1px dashed #374151;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #5eead4;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            background: #1f2937;
            border: 1px solid #374151;
            color: #14b8a6;
            padding: 12px;
            border-radius: 6px;
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        input[type="text"]:focus {
            border-color: #14b8a6;
            box-shadow: 0 0 10px rgba(20, 184, 166, 0.2);
        }

        textarea {
            width: 100%;
            height: 180px;
            background: #030712;
            border: 1px solid #374151;
            color: #f3f4f6;
            padding: 15px;
            border-radius: 6px;
            resize: vertical;
            line-height: 1.6;
            font-size: 0.95rem;
            outline: none;
            margin-top: 10px;
        }

        textarea:focus {
            border-color: #14b8a6;
        }

        button {
            width: 100%;
            background: transparent;
            color: #14b8a6;
            border: 1px solid #14b8a6;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            background: #14b8a6;
            color: #111827;
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.4);
        }

    </style>
</head>

                    en: "Share the opening hours of [Shop Name] clearly, emphasizing consistency and highlighting any special days (e.g., \"Open on Sundays\").",
                    mm: "[Shop Name] ၏ ဆိုင်ဖွင့်ချိန်များကို ရှင်းလင်းစွာ မျှဝေပါ။ ပုံမှန်ဖွင့်လှစ်မှုကို အလေးပေးပြီး အထူးနေ့ရက်များ (ဥပမာ- \"တနင်္ဂနွေနေ့များတွင် ဖွင့်သည်\") ကို ပေါ်လွင်စေပါ။",
                    inputs: [
                        { id: "Shop Name", label: "ဆိုင်အမည်", hint: "ဥပမာ - Dental Clinic" }
                    ]
                }
            ];

            const container = document.getElementById('accordion-container');
            const langRadios = document.getElementsByName('language');

            function renderAccordion() {
                container.innerHTML = ''; 

                promptData.forEach((data) => {
                    if (data.type === "header") {
                        const header = document.createElement('div');
                        header.className = 'section-title';
                        header.innerText = data.title;
                        container.appendChild(header);
                        return; // Skip the rest for headers
                    }

                    const item = document.createElement('div');
                    item.className = 'accordion-item';
                    item.id = `acc-item-${data.id}`;

                    let html = `
                        <div class="accordion-header" onclick="toggleAccordion('${data.id}')">
                            <div class="header-content">
                                <div class="acc-title">${data.title}</div>
                                <div class="acc-desc">💡 ${data.desc}</div>
                            </div>
                            <div class="acc-icon">▼</div>
                        </div>
                    `;

                    html += `<div class="accordion-body" id="acc-body-${data.id}">
                                <div class="body-inner">`;

                    if(data.inputs && data.inputs.length > 0) {
                        data.inputs.forEach(input => {
                            html += `
                                <div class="form-group">
                                    <label>${input.label}</label>
                                    <input type="text" id="input-${data.id}-${input.id}" data-item-id="${data.id}" placeholder="${input.hint}">
                                </div>
                            `;
                        });
                    }

                    html += `
                            <textarea id="output-${data.id}" readonly></textarea>
                            <button id="copy-${data.id}" data-item-id="${data.id}">Copy Prompt</button>
                        </div>
                    </div>`;

                    item.innerHTML = html;
                    container.appendChild(item);
                });

                attachEventListeners();
                updateAllPrompts();
            }

            window.toggleAccordion = function(id) {
                const item = document.getElementById(`acc-item-${id}`);
                const body = document.getElementById(`acc-body-${id}`);

                // Auto-collapse logic
                document.querySelectorAll('.accordion-item').forEach(el => {
                    if(el.id !== `acc-item-${id}`) {
                        el.classList.remove('active');
                        el.querySelector('.accordion-body').style.maxHeight = null;
                    }
                });

                if (item.classList.contains('active')) {
                    item.classList.remove('active');
                    body.style.maxHeight = null;
                } else {
                    item.classList.add('active');
                    body.style.maxHeight = body.scrollHeight + "px";
                }
            }

            function updatePromptForCard(itemId) {
                const data = promptData.find(p => p.id === itemId);
                if (!data || data.type === "header") return;

                const isMyanmar = document.querySelector('input[name="language"]:checked').value === 'mm';
                let finalPrompt = isMyanmar ? data.mm : data.en;

                if (data.inputs) {
                    data.inputs.forEach(input => {
                        const el = document.getElementById(`input-${data.id}-${input.id}`);
                        const val = el && el.value.trim() !== "" ? el.value.trim() : `[${input.id}]`;
                        finalPrompt = finalPrompt.split(`[${input.id}]`).join(val);
                    });
                }

                document.getElementById(`output-${data.id}`).value = finalPrompt;
                
                const body = document.getElementById(`acc-body-${data.id}`);
                const item = document.getElementById(`acc-item-${data.id}`);
                if(item.classList.contains('active')) {
                    body.style.maxHeight = body.scrollHeight + "px";
                }
            }

            function updateAllPrompts() {
                promptData.forEach(data => {
                    if(data.type !== "header") updatePromptForCard(data.id);
                });
            }

            function attachEventListeners() {
                container.addEventListener('input', (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                        const itemId = e.target.getAttribute('data-item-id');
                        if (itemId) updatePromptForCard(itemId);
                    }
                });

                container.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') {
                        const itemId = e.target.getAttribute('data-item-id');
                        const outputEl = document.getElementById(`output-${itemId}`);
                        outputEl.select();
                        document.execCommand('copy');
                        
                        const btn = e.target;
                        const originalText = btn.innerText;
                        btn.innerText = "COPIED! ✨";
                        setTimeout(() => btn.innerText = originalText, 2000);
                    }
                });
            }

            langRadios.forEach(radio => radio.addEventListener('change', updateAllPrompts));

            renderAccordion();
            setTimeout(() => { toggleAccordion('p1'); }, 100);
        });
    </script>
