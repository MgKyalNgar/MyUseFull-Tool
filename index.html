<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Master Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            /* ပိုထင်ရှားသော Techno Background */
            background-color: #040812;
            background-image: 
                /* ဇယားကွက်လိုင်းများ (ပိုထင်ရှားအောင်လုပ်ထားသည်) */
                linear-gradient(to right, rgba(0, 243, 255, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 243, 255, 0.08) 1px, transparent 1px),
                /* အပေါ်မှ ဟပ်နေသော အလင်းရောင် */
                radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.15) 0%, transparent 60%);
            background-size: 30px 30px, 30px 30px, 100% 100%;
            background-attachment: fixed;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
            color: #00f3ff;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.5), 0 0 30px rgba(0, 243, 255, 0.2);
        }

        .subtitle {
            color: #64748b;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ----- Grid Layout (Compact) ----- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 900px;
        }

        /* ----- Compact Horizontal Card Design ----- */
        .app-card {
            background: rgba(10, 15, 25, 0.85);
            border: 1px solid #1e293b;
            border-left: 4px solid var(--theme-color);
            border-radius: 8px;
            padding: 15px;
            text-decoration: none;
            display: flex;
            flex-direction: row;
            align-items: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }

        .app-card:hover {
            transform: translateX(5px);
            background: rgba(15, 22, 35, 0.95);
            border-color: var(--theme-color);
            box-shadow: 0 0 15px calc(var(--theme-color) + 33), inset 0 0 10px calc(var(--theme-color) + 11);
        }

        .card-icon {
            font-size: 2rem;
            margin-right: 15px;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
            transition: transform 0.3s ease;
        }

        .app-card:hover .card-icon {
            transform: scale(1.1);
        }

        .card-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            color: #f8fafc;
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .card-desc {
            color: #8b9bb4;
            font-size: 0.8rem;
            line-height: 1.3;
        }

        /* Tech Arrow Indicator */
        .go-icon {
            color: var(--theme-color);
            font-size: 1.5rem;
            font-weight: bold;
            opacity: 0.5;
            transition: all 0.3s ease;
            margin-left: 10px;
        }

        .app-card:hover .go-icon {
            opacity: 1;
            transform: translateX(3px);
            text-shadow: 0 0 10px var(--theme-color);
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>Prompt_Hub</h1>
        <p class="subtitle">// System.SelectModule()</p>
    </div>

    <div class="grid-container" id="app-grid"></div>

    <script>
        const promptApps = [
            {
                title: "Boost Your Life",
                desc: "Productivity & Life Hacking Prompts",
                icon: "🌱",
                url: "PromptColc/Prompt for Boost Your Life.html",
                theme: "#00ffaa" 
            },
            {
                title: "Dress Shop Prompts",
                desc: "Fashion & Product Photography",
                icon: "👗",
                url: "PromptColc/Prompt for Dress Shop.html",
                theme: "#ff00aa" 
            },
            {
                title: "FB Page Growth",
                desc: "Viral Hooks & Content Strategy",
                icon: "🚀",
                url: "PromptColc/Prompt for Facebook Page.html",
                theme: "#00a8ff" 
            },
            {
                title: "FB Engage Master",
                desc: "Engagement & Community Building",
                icon: "💬",
                url: "PromptColc/Prompt for Facebook Engage.html",
                theme: "#3b82f6" 
            },
            {
                title: "Photoshop Prompts",
                desc: "Image Editing & Generative AI",
                icon: "🎨",
                url: "PromptColc/Prompt for Use as Photoshop.html",
                theme: "#b100ff" 
            }
        ];

        const gridContainer = document.getElementById('app-grid');

        promptApps.forEach(app => {
            const card = document.createElement('a');
            card.href = app.url;
            card.className = 'app-card';
            
            card.style.setProperty('--theme-color', app.theme);

            card.innerHTML = `
                <div class="card-icon">${app.icon}</div>
                <div class="card-content">
                    <div class="card-title">${app.title}</div>
                    <div class="card-desc">${app.desc}</div>
                </div>
                <div class="go-icon">›</div>
            `;

            gridContainer.appendChild(card);
        });
    </script>
</body>
</html>
