<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#040812">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="My Useful Tools">
    <link rel="apple-touch-icon" href="/icon-192x192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Master Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            /* ပိုထင်ရှားသော Techno Background */
            background-color: #040812;
            background-image: 
                linear-gradient(to right, rgba(0, 243, 255, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 243, 255, 0.08) 1px, transparent 1px),
                radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.15) 0%, transparent 60%);
            background-size: 30px 30px, 30px 30px, 100% 100%;
            background-attachment: fixed;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px 0 15px; /* အောက်ခြေမှာ Footer ရှိလို့ Padding ချိန်ထားသည် */
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
            color: #00f3ff;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.5), 0 0 30px rgba(0, 243, 255, 0.2);
        }

        .subtitle {
            color: #64748b;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ----- Main Container ----- */
        .main-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            flex: 1; /* Footer ကို အောက်ဆုံးရောက်စေရန် */
        }

        /* ----- Category Header ----- */
        .category-header {
            margin: 30px 0 15px 0;
            color: #8b9bb4;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px dashed #1e293b;
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ----- Grid Layout (Compact) ----- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            width: 100%;
        }

        /* ----- Compact Horizontal Card Design ----- */
        .app-card {
            background: rgba(10, 15, 25, 0.85);
            border: 1px solid #1e293b;
            border-left: 4px solid var(--theme-color);
            border-radius: 8px;
            padding: 15px;
            text-decoration: none;
            display: flex;
            flex-direction: row;
            align-items: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }

        .app-card:hover {
            transform: translateX(5px);
            background: rgba(15, 22, 35, 0.95);
            border-color: var(--theme-color);
            box-shadow: 0 0 15px calc(var(--theme-color) + 33), inset 0 0 10px calc(var(--theme-color) + 11);
        }

        .card-icon {
            font-size: 2rem;
            margin-right: 15px;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
            transition: transform 0.3s ease;
        }

        .app-card:hover .card-icon {
            transform: scale(1.1);
        }

        .card-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            color: #f8fafc;
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .card-desc {
            color: #8b9bb4;
            font-size: 0.8rem;
            line-height: 1.3;
        }

        /* Tech Arrow Indicator */
        .go-icon {
            color: var(--theme-color);
            font-size: 1.5rem;
            font-weight: bold;
            opacity: 0.5;
            transition: all 0.3s ease;
            margin-left: 10px;
        }

        .app-card:hover .go-icon {
            opacity: 1;
            transform: translateX(3px);
            text-shadow: 0 0 10px var(--theme-color);
        }

        /* ----- Footer ----- */
        .footer {
            margin-top: 50px;
            padding: 20px;
            width: 100%;
            text-align: center;
            color: #475569;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border-top: 1px solid rgba(30, 41, 59, 0.5);
            background: rgba(4, 8, 18, 0.8);
            backdrop-filter: blur(5px);
        }

        .footer span {
            color: #00f3ff;
            font-weight: 600;
        }
		
		.my-camera-tool {
            margin-top: 50px; /* categories တွေနဲ့ နည်းနည်းခွာရန် */
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .my-camera-tool a {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: #d1d5db; /* Light grey text */
            background: rgba(20, 10, 5, 0.8); /* Subtly different amber/brown background */
            border: 1px solid #d97757; /* Claude Amber Border */
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(217, 119, 87, 0.1); /* Subtle initial glow */
        }

        /* Hover effect */
        .my-camera-tool a:hover {
            color: #ffffff; /* White text on hover */
            background: rgba(30, 15, 7, 0.95); /* Deepen background */
            border-color: #fca5a5; /* Brighten border to a light coral/peach */
            transform: translateY(-3px); /* Subtly lift */
            box-shadow: 0 0 20px rgba(217, 119, 87, 0.6), inset 0 0 15px rgba(217, 119, 87, 0.3); /* Stronger glow */
        }

        /* Icon through CSS */
        .my-camera-tool a::before {
            content: '📸'; /* Folder icon */
            font-size: 1.5rem;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>Kyal_Ngar's_Prompt_Hub</h1>
        <p class="subtitle">// System.SelectModule()</p>
    </div>

    <div class="main-container" id="main-container"></div>
	
    <div class="footer">
        Create by <span>Mg Kyal Ngar</span>
    </div>

    <script>
        // Array ထဲတွင် Category များ ခွဲခြားထည့်သွင်းထားပါသည်
        const promptApps = [
		    {
                category: "🎨 Creative Design",
                title: "Photoshop Prompts",
                desc: "Image Editing & Generative AI",
                icon: "🎨",
                url: "PromptColc/Prompt for Use as Photoshop.html",
                theme: "#b100ff" 
            },
            {
                category: "🎨 Creative Design",
                title: "Nano Banana Prompts",
                desc: "Creative Image Generation",
                icon: "🍌",
                url: "PromptColc/Prompt for Nano Banana.html",
                theme: "#facc15" 
            },
            {
                category: "🌐 Facebook Strategy",
                title: "FB Page Growth",
                desc: "Viral Hooks & Content Strategy",
                icon: "🚀",
                url: "PromptColc/Prompt for Facebook Page.html",
                theme: "#00a8ff" 
            },
            {
                category: "🌐 Facebook Strategy",
                title: "FB Engage Master",
                desc: "Engagement & Community Building",
                icon: "💬",
                url: "PromptColc/Prompt for Facebook Engage.html",
                theme: "#3b82f6" 
            },
            {
                category: "▶️ YouTube Mastery",
                title: "YT 30-Day Prompts",
                desc: "Monetization in 30-90 Days",
                icon: "▶️",
                url: "PromptColc/Prompt for Youtube 30 Day.html",
                theme: "#ff0000" 
            },
            {
                category: "▶️ YouTube Mastery",
                title: "YT Channel Mastery",
                desc: "Growth & Monetization Strategy",
                icon: "💰",
                url: "PromptColc/Prompt for Youtube Monetization.html",
                theme: "#fbbf24" 
            },
			{
                category: "💡 Life & E-Commerce",
                title: "Boost Your Life",
                desc: "Productivity & Life Hacking Prompts",
                icon: "🌱",
                url: "PromptColc/Prompt for Boost Your Life.html",
                theme: "#00ffaa" 
            },
            {
                category: "💡 Life & E-Commerce",
                title: "Dress Shop Prompts",
                desc: "Fashion & Product Photography",
                icon: "👗",
                url: "PromptColc/Prompt for Dress Shop.html",
                theme: "#ff00aa" 
            },
			{
                category: "🎨 Creative Design",
                title: "Pro Product Photography",
                desc: "Studio, Outdoor & Food Photography",
                icon: "📸",
                url: "PromptColc/Prompt for Professional Product Photography.html",
                theme: "#ffffff" // Classic White
            },
			{
                category: "⚙️ Productivity & Automation", 
                title: "Claude Workflow",
                desc: "Agentic Automation Prompts",
                icon: "⚙️",
                url: "PromptColc/Prompt for Claude Workflow.html",
                theme: "#d97757" // Claude Amber
            }
            
        ];

        const mainContainer = document.getElementById('main-container');

        // Category အလိုက် Data များကို အုပ်စုခွဲခြင်း
        const groupedApps = promptApps.reduce((acc, app) => {
            if (!acc[app.category]) {
                acc[app.category] = [];
            }
            acc[app.category].push(app);
            return acc;
        }, {});

        // HTML ပေါ်တွင် Group အလိုက် Render လုပ်ခြင်း
        for (const [category, apps] of Object.entries(groupedApps)) {
            // Category Header ဖန်တီးခြင်း
            const header = document.createElement('div');
            header.className = 'category-header';
            header.innerText = category;
            mainContainer.appendChild(header);

            // Grid Container ဖန်တီးခြင်း
            const grid = document.createElement('div');
            grid.className = 'grid-container';

            // သက်ဆိုင်ရာ ကတ်များကို ထည့်သွင်းခြင်း
            apps.forEach(app => {
                const card = document.createElement('a');
                card.href = app.url;
                card.className = 'app-card';
                card.style.setProperty('--theme-color', app.theme);

                card.innerHTML = `
                    <div class="card-icon">${app.icon}</div>
                    <div class="card-content">
                        <div class="card-title">${app.title}</div>
                        <div class="card-desc">${app.desc}</div>
                    </div>
                    <div class="go-icon">›</div>
                `;
                grid.appendChild(card);
            });

            mainContainer.appendChild(grid);
        }
		
		const oldToolsLinkContainer = document.createElement('div');
        oldToolsLinkContainer.className = 'my-camera-tool';
        
        const linkAnchor = document.createElement('a');
        linkAnchor.href = "Old Tools index.html";
        linkAnchor.innerText = "My Camera Tools";
        
        oldToolsLinkContainer.appendChild(linkAnchor);
        mainContainer.appendChild(oldToolsLinkContainer);
		
		// Service Worker ကို မှတ်ပုံတင်ခြင်း (PWA အလုပ်လုပ်စေရန်)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                .then(registration => {
                    console.log('ServiceWorker registration successful');
                })
                .catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
		
</body>
</html>
